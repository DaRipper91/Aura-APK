name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: false

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    - name: Build with Gradle
      run: |
        cd android
        ./gradlew assemblePixelDebug assembleSamsungDebug
        VERSION_NAME=$(grep "versionName \"" app/build.gradle | awk -F'"' '{print $2}')
        echo "AURA_VERSION=$VERSION_NAME" >> $GITHUB_ENV

    - name: Upload Pixel APK
      uses: actions/upload-artifact@v4
      with:
        name: aura-pixel-debug
        path: android/app/build/outputs/apk/pixel/debug/app-pixel-debug.apk

    - name: Upload Samsung APK
      uses: actions/upload-artifact@v4
      with:
        name: aura-samsung-debug
        path: android/app/build/outputs/apk/samsung/debug/app-samsung-debug.apk

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          android/app/build/outputs/apk/pixel/debug/app-pixel-debug.apk
          android/app/build/outputs/apk/samsung/debug/app-samsung-debug.apk
        tag_name: v${{ env.AURA_VERSION }}
        name: Release ${{ env.AURA_VERSION }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
